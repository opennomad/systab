name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    container: ghcr.io/catthehacker/ubuntu:act-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: apt-get update && apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck systab
